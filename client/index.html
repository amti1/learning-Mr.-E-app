<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="منصة تعلم اللغة العربية - Arabic Memorization Learning Platform" />
  <meta name="theme-color" content="#0A1628" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>عربي — Arabic Learning Platform</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="/css/design-system.css" />
  <link rel="stylesheet" href="/css/themes.css" />
  <link rel="stylesheet" href="/css/animations.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/pages.css" />

  <!-- Favicon (inline SVG) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>عـ</text></svg>" />
</head>
<body>
  <!-- Splash / Loading Screen -->
  <div id="app-loading" class="splash-screen">
    <div class="splash-content">
      <div class="splash-logo">
        <span class="splash-logo-text">عربي</span>
        <div class="splash-logo-glow"></div>
      </div>
      <p class="splash-tagline">Arabic Learning Platform</p>
      <div class="splash-loader">
        <div class="splash-loader-bar"></div>
      </div>
    </div>
  </div>

  <!-- Main Application Container -->
  <div id="app" style="display:none;">
    <nav id="app-navbar"></nav>
    <main id="main-content" class="main-content"></main>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- Modal Container -->
  <div id="modal-container"></div>

  <!-- Achievement Popup Container -->
  <div id="achievement-container" class="achievement-container"></div>

  <!-- App Script -->
  <script type="module" src="/js/app.js"></script>
</body>
</html>
